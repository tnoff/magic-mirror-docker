services:
  magic-mirror:
    # Build the image locally from the repo Dockerfile. To use a prebuilt
    # image from a registry instead, comment out `build` and set `image`.
    build:
      context: .
    image: ${MIRROR_IMAGE:-magic-mirror:latest}
    container_name: magic-mirror
    restart: unless-stopped
    ports:
      - "${MIRROR_HOST_PORT:-8080}:8080"
    # Load everything from .env into the container (config.js envsubst vars,
    # API keys, OTel settings). Copy .env.example to .env to get started.
    env_file:
      - .env
    volumes:
      # Required: your MagicMirror config. Must be readable by UID 1000.
      - ${MIRROR_CONFIG:-./volumes/config.js}:/opt/mirror/env/config.js:ro
      # Optional: custom startup script run before the server launches.
      # Uncomment and point MIRROR_CUSTOM_STARTUP at a script to enable.
      # - ${MIRROR_CUSTOM_STARTUP:-./volumes/custom-startup.sh}:/opt/mirror/env/custom-startup.sh:ro

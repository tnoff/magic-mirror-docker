include:
  - project: 'tnoff-projects/github-workflows'
    ref: c3e8e55214cddced785b232cbee75d6c5e45ec81
    file: '/gitlab/tag.yml'
  - project: 'tnoff-projects/github-workflows'
    ref: c3e8e55214cddced785b232cbee75d6c5e45ec81
    file: '/gitlab/discord-notify.yml'
  - project: 'tnoff-projects/github-workflows'
    ref: c3e8e55214cddced785b232cbee75d6c5e45ec81
    file: '/gitlab/renovate.yml'
  - project: 'tnoff-projects/github-workflows'
    ref: a5e9849f148c62b128b033e79676ffb8ab4ee129
    file: '/gitlab/branch-cleanup.yml'
  - project: 'tnoff-projects/github-workflows'
    ref: c3e8e55214cddced785b232cbee75d6c5e45ec81
    file: '/gitlab/trufflehog.yml'
  - project: 'tnoff-projects/github-workflows'
    ref: c3e8e55214cddced785b232cbee75d6c5e45ec81
    file: '/gitlab/trufflehog-image.yml'
  - project: 'tnoff-projects/github-workflows'
    ref: c3e8e55214cddced785b232cbee75d6c5e45ec81
    file: '/gitlab/bump-version.yml'
  - project: 'tnoff-projects/github-workflows'
    ref: c3e8e55214cddced785b232cbee75d6c5e45ec81
    file: '/gitlab/trigger-bump.yml'
  - project: 'tnoff-projects/github-workflows'
    ref: c3e8e55214cddced785b232cbee75d6c5e45ec81
    file: '/gitlab/buildkit-build-check.yml'
  - project: 'tnoff-projects/github-workflows'
    ref: c3e8e55214cddced785b232cbee75d6c5e45ec81
    file: '/gitlab/buildkit-docker-push.yml'

default:
  tags:
    - self-hosted

stages:
  - validate
  - tag
  - build
  - notify
  - renovate

# Shared rules for the image-build + image-scan jobs. On MRs that don't touch
# the Dockerfile (where renovate-managed ARG refs live) or files/ (the local
# startup + otel-init bits the Dockerfile COPYs in), skip these jobs — they
# otherwise burn runner slots on cosmetic MRs (github-workflows ref bumps,
# doc-only edits, renovate.json tweaks). Fork MRs keep the manual gate;
# default-branch builds always run.
.image-build-rules:
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event" && $CI_MERGE_REQUEST_SOURCE_PROJECT_ID != $CI_PROJECT_ID
      when: manual
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      changes:
        - Dockerfile
        - files/**/*
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH && $CI_PIPELINE_SOURCE != "schedule"

bump-version:
  extends: .bump-version
  variables:
    GITLAB_PUSH_TOKEN: $RENOVATE_TOKEN
    BUMP_CHANGELOG: 'true'
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event" && $CI_MERGE_REQUEST_SOURCE_BRANCH_NAME =~ /^renovate\/dev-/

tag-build:
  extends: .tag
  stage: tag
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH && $CI_PIPELINE_SOURCE != "schedule"
      when: on_success

build-check:
  extends: .buildkit-build-check
  rules: !reference [.image-build-rules, rules]

docker-push:
  extends: .buildkit-docker-push

# Producer side of the docker-apps image-pin bump flow.
# BUMP_SOURCE=magic-mirror (not magic-mirror-docker) — docker-apps rewrites
# the pin in both apps/mirror/castro and apps/mirror/concord manifests.
# See github-workflows/gitlab/trigger-bump.yml for the template details.
trigger-bump-docker-apps:
  extends: .trigger-bump
  needs:
    - job: docker-push
      artifacts: true
  variables:
    BUMP_SOURCE: 'magic-mirror'

trufflehog:
  extends: .trufflehog
  stage: validate
  rules:
    # Fork MRs require a project member to manually trigger jobs — prevents untrusted code from running CI automatically
    - if: $CI_PIPELINE_SOURCE == "merge_request_event" && $CI_MERGE_REQUEST_SOURCE_PROJECT_ID != $CI_PROJECT_ID
      when: manual
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"

trufflehog-image:
  extends: .trufflehog-image
  stage: validate
  needs: [build-check]
  variables:
    TRUFFLEHOG_IMAGE_TARBALL: image.tar
  rules: !reference [.image-build-rules, rules]


notify-mr:
  extends: .discord-notify
  stage: notify
  needs: []
  variables:
    NOTIFY_TYPE: mr_opened
    DISCORD_WEBHOOK_URL: $DISCORD_MR_OPENED_WEBHOOK
  rules:
    # Fork MRs require a project member to manually trigger jobs — prevents untrusted code from running CI automatically
    - if: $CI_PIPELINE_SOURCE == "merge_request_event" && $CI_MERGE_REQUEST_SOURCE_PROJECT_ID != $CI_PROJECT_ID
      when: manual
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      when: always

notify-tag-failure:
  extends: .discord-notify
  stage: notify
  needs: [tag-build, docker-push, trigger-bump-docker-apps]
  variables:
    NOTIFY_TYPE: failure
    DISCORD_WEBHOOK_URL: $DISCORD_BUILD_FAILURE_WEBHOOK
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH && $CI_PIPELINE_SOURCE != "schedule"
      when: on_failure

notify-renovate-failure:
  extends: .discord-notify
  stage: renovate
  needs: [renovate]
  variables:
    NOTIFY_TYPE: failure
    DISCORD_WEBHOOK_URL: $DISCORD_BUILD_FAILURE_WEBHOOK
    NOTIFY_MESSAGE: 'Renovate failed'
  rules:
    - if: $CI_PIPELINE_SOURCE == "schedule"
      when: on_failure

notify-merged:
  extends: .discord-notify
  stage: notify
  needs: []
  variables:
    NOTIFY_TYPE: mr_merged
    DISCORD_WEBHOOK_URL: $DISCORD_MR_MERGED_WEBHOOK
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH && $CI_PIPELINE_SOURCE != "schedule"
      when: always

renovate:
  extends: .renovate
  stage: renovate
  variables:
    GITHUB_COM_TOKEN: $GITHUB_BOT_TOKEN
  rules:
    - if: $CI_PIPELINE_SOURCE == "schedule"

# Scheduled prune of stale automation branches (bump/* + renovate/*) left
# behind because remove_source_branch only fires on MR merge, not on the
# API-driven close of a superseded bump/renovate MR. Rides the weekly
# schedule and reuses RENOVATE_TOKEN. See the github-workflows
# .branch-cleanup template and docs runbooks/branch-cleanup.md.
branch-cleanup:
  extends: .branch-cleanup
  stage: renovate
  variables:
    CLEANUP_AGE_DAYS: "30"
    DRY_RUN: "false"
  rules:
    - if: $CI_PIPELINE_SOURCE == "schedule"

notify-cleanup-failure:
  extends: .discord-notify
  stage: renovate
  needs: [branch-cleanup]
  variables:
    NOTIFY_TYPE: failure
    DISCORD_WEBHOOK_URL: $DISCORD_BUILD_FAILURE_WEBHOOK
    NOTIFY_MESSAGE: 'Branch cleanup failed'
  rules:
    - if: $CI_PIPELINE_SOURCE == "schedule"
      when: on_failure

include:
  - project: 'tnoff-projects/github-workflows'
    ref: 5872f0029aac5cb47856ee99b28f5bf080869d18
    file: '/gitlab/tag.yml'
  - project: 'tnoff-projects/github-workflows'
    ref: 5872f0029aac5cb47856ee99b28f5bf080869d18
    file: '/gitlab/discord-notify.yml'
  - project: 'tnoff-projects/github-workflows'
    ref: 5872f0029aac5cb47856ee99b28f5bf080869d18
    file: '/gitlab/renovate.yml'
  - project: 'tnoff-projects/github-workflows'
    ref: 5872f0029aac5cb47856ee99b28f5bf080869d18
    file: '/gitlab/trufflehog.yml'
  - project: 'tnoff-projects/github-workflows'
    ref: 5872f0029aac5cb47856ee99b28f5bf080869d18
    file: '/gitlab/trufflehog-image.yml'
  - project: 'tnoff-projects/github-workflows'
    ref: 5872f0029aac5cb47856ee99b28f5bf080869d18
    file: '/gitlab/bump-version.yml'

default:
  tags:
    - self-hosted

stages:
  - validate
  - tag
  - build
  - notify
  - renovate

bump-version:
  extends: .bump-version
  variables:
    GITLAB_PUSH_TOKEN: $RENOVATE_TOKEN
    BUMP_CHANGELOG: 'true'
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event" && $CI_MERGE_REQUEST_SOURCE_BRANCH_NAME =~ /^renovate\/dev-/

tag-build:
  extends: .tag
  stage: tag
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH && $CI_PIPELINE_SOURCE != "schedule"
      when: on_success

build-check:
  stage: validate
  image: docker.io/moby/buildkit:v0.29.0
  script:
    - |
      buildctl --addr tcp://buildkitd.gitlab-runner.svc.cluster.local:1234 build \
        --frontend dockerfile.v0 \
        --local context=. --local dockerfile=. \
        --output type=docker,name=magic-mirror-docker:ci,dest=image.tar
  artifacts:
    paths:
      - image.tar
    expire_in: 1 day
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event" && $CI_MERGE_REQUEST_SOURCE_PROJECT_ID != $CI_PROJECT_ID
      when: manual
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"

docker-push:
  stage: build
  image: docker.io/moby/buildkit:v0.29.0
  needs: []
  variables:
    DOCKER_CONFIG: /tmp/.docker
  before_script:
    - mkdir -p "$DOCKER_CONFIG"
    - |
      OCI_USERNAME=$(printf '%s' "$OCI_USERNAME_64" | base64 -d)
      OCI_TOKEN=$(printf '%s' "$OCI_TOKEN_64" | base64 -d)
      OCI_REGISTRY=$(printf '%s' "$OCI_REGISTRY_64" | base64 -d)
      OCI_NAMESPACE=$(printf '%s' "$OCI_NAMESPACE_64" | base64 -d)
      OCI_REPO_NAME=$(printf '%s' "$OCI_REPO_NAME_64" | base64 -d)
      AUTH=$(printf '%s:%s' "$OCI_USERNAME" "$OCI_TOKEN" | base64 | tr -d '\n')
      cat > "$DOCKER_CONFIG/config.json" <<EOF
      {"auths":{"$OCI_REGISTRY":{"auth":"$AUTH"}}}
      EOF
  script:
    - IMAGE="$OCI_REGISTRY/$OCI_NAMESPACE/$OCI_REPO_NAME"
    # Emit IMAGE for downstream jobs (e.g. trigger-bump-docker-apps) that need
    # the full image reference without re-decoding the OCI_*_64 vars.
    - echo "IMAGE=$IMAGE" >> build.env
    - |
      buildctl --addr tcp://buildkitd.gitlab-runner.svc.cluster.local:1234 build \
        --frontend dockerfile.v0 \
        --local context=. --local dockerfile=. \
        --opt platform=linux/arm64 \
        --output type=image,name=$IMAGE:$CI_COMMIT_SHORT_SHA,push=true
    - |
      buildctl --addr tcp://buildkitd.gitlab-runner.svc.cluster.local:1234 build \
        --frontend dockerfile.v0 \
        --local context=. --local dockerfile=. \
        --opt platform=linux/arm64 \
        --output type=image,name=$IMAGE:latest,push=true
  artifacts:
    reports:
      dotenv: build.env
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH && $CI_PIPELINE_SOURCE != "schedule"
      when: on_success

# Fires the cross-project pipeline trigger on docker-apps after a new image
# is pushed. docker-apps' .bump-image-pin-base picks up the trigger (gated
# on BUMP_SOURCE == "magic-mirror"), rewrites the pin in both castro and
# concord manifests, and opens an MR. allow_failure so a flaky downstream
# automation doesn't fail the main pipeline.
#
# DOCKER_APPS_PROJECT_ID and DOCKER_APPS_TRIGGER_TOKEN are masked CI
# variables set via terraform.
trigger-bump-docker-apps:
  stage: build
  image: docker.io/library/alpine:3
  needs:
    - job: docker-push
      artifacts: true
  allow_failure: true
  before_script:
    - apk add --no-cache curl
  script:
    - |
      [ -n "$DOCKER_APPS_PROJECT_ID" ] || { echo "DOCKER_APPS_PROJECT_ID not set" >&2; exit 1; }
      [ -n "$DOCKER_APPS_TRIGGER_TOKEN" ] || { echo "DOCKER_APPS_TRIGGER_TOKEN not set" >&2; exit 1; }
      [ -n "$IMAGE" ] || { echo "IMAGE not set — did docker-push emit build.env?" >&2; exit 1; }

      curl -sS --fail-with-body -X POST \
        --form "token=$DOCKER_APPS_TRIGGER_TOKEN" \
        --form "ref=main" \
        --form "variables[BUMP_SOURCE]=magic-mirror" \
        --form "variables[IMAGE_NAME]=$IMAGE" \
        --form "variables[IMAGE_TAG]=$CI_COMMIT_SHORT_SHA" \
        "$CI_API_V4_URL/projects/$DOCKER_APPS_PROJECT_ID/trigger/pipeline"
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH && $CI_PIPELINE_SOURCE != "schedule"
      when: on_success

trufflehog:
  extends: .trufflehog
  stage: validate
  rules:
    # Fork MRs require a project member to manually trigger jobs — prevents untrusted code from running CI automatically
    - if: $CI_PIPELINE_SOURCE == "merge_request_event" && $CI_MERGE_REQUEST_SOURCE_PROJECT_ID != $CI_PROJECT_ID
      when: manual
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"

trufflehog-image:
  extends: .trufflehog-image
  stage: validate
  needs: [build-check]
  variables:
    TRUFFLEHOG_IMAGE_TARBALL: image.tar
  rules:
    # Fork MRs require a project member to manually trigger jobs — prevents untrusted code from running CI automatically
    - if: $CI_PIPELINE_SOURCE == "merge_request_event" && $CI_MERGE_REQUEST_SOURCE_PROJECT_ID != $CI_PROJECT_ID
      when: manual
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"


notify-mr:
  extends: .discord-notify
  stage: notify
  needs: []
  variables:
    NOTIFY_TYPE: mr_opened
    DISCORD_WEBHOOK_URL: $DISCORD_MR_WEBHOOK
  rules:
    # Fork MRs require a project member to manually trigger jobs — prevents untrusted code from running CI automatically
    - if: $CI_PIPELINE_SOURCE == "merge_request_event" && $CI_MERGE_REQUEST_SOURCE_PROJECT_ID != $CI_PROJECT_ID
      when: manual
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      when: always

notify-tag-failure:
  extends: .discord-notify
  stage: notify
  needs: [tag-build, docker-push]
  variables:
    NOTIFY_TYPE: failure
    DISCORD_WEBHOOK_URL: $DISCORD_BUILD_FAILURE_WEBHOOK
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH && $CI_PIPELINE_SOURCE != "schedule"
      when: on_failure

notify-merged:
  extends: .discord-notify
  stage: notify
  needs: []
  variables:
    NOTIFY_TYPE: mr_merged
    DISCORD_WEBHOOK_URL: $DISCORD_MR_WEBHOOK
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH && $CI_PIPELINE_SOURCE != "schedule"
      when: always

renovate:
  extends: .renovate
  stage: renovate
  variables:
    GITHUB_COM_TOKEN: $GITHUB_BOT_TOKEN
  rules:
    - if: $CI_PIPELINE_SOURCE == "schedule"

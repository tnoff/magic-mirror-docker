default:
  # Ride out ci-pool cold-starts / node churn (warm ci floor + autoscaler
  # scale-down grace live in terraform nodes_v2_ci and docker-apps
  # cluster-autoscaler). These `when:` classes are infra-side failures, never
  # `script_failure`, so a failing test/lint is never silently retried. GitLab
  # caps retry:max at 2 (= 3 total attempts).
  retry:
    max: 2
    when:
      - runner_system_failure
      - stuck_or_timeout_failure
      - scheduler_failure
  tags:
    - self-hosted

# Canonical trigger-prefixed stages (CI consolidation, docs!59):
#   pr-check  pre-merge validation (image build-check, image/secret scan)
#   test      tox matrix (none in this repo)
#   push      default-branch tag/image publish
#   notify    Discord MR + failure notifications
#   renovate  scheduled dependency + branch maintenance
stages:
  - pr-check
  - test
  - push
  - notify
  - renovate

# Shared rules for the pre-merge image-build + image-scan jobs (pr-check:build,
# pr-check:scan). They validate an image BEFORE merge, on MRs that touch
# the Dockerfile (where renovate-managed ARG refs live) or files/ (the local
# startup + otel-init bits the Dockerfile COPYs in). Skipped on cosmetic MRs
# (github-workflows ref bumps, doc-only edits, renovate.json tweaks); fork MRs
# keep the manual gate.
#
# Deliberately NOT run on the default branch: there, push:image (needs: [])
# already rebuilds and pushes the image directly and in parallel, so a
# separate build-check is just a redundant second build, and a post-push
# image scan gates nothing (the image is already in the registry).
.image-build-rules:
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event" && $CI_MERGE_REQUEST_SOURCE_PROJECT_ID != $CI_PROJECT_ID
      when: manual
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      changes:
        - Dockerfile
        - files/**/*

bump-version:
  extends: .bump-version
  variables:
    GITLAB_PUSH_TOKEN: $RENOVATE_TOKEN
    BUMP_CHANGELOG: 'true'
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event" && $CI_MERGE_REQUEST_SOURCE_BRANCH_NAME =~ /^renovate\/dev-/

# Heavy-repo guard: the assemble-changelog fold pushes a "docs: assemble
# changelog for X" commit to main, which fires a follow-up pipeline. That commit
# is byte-identical in the image context, so re-running push:image would skip the
# tag write (shared digest) and trigger-bump would then pin docker-apps at a tag
# that was never written → phantom Flux pin. Reference this from any job that
# must NOT re-run on the fold commit; the follow-up pipeline should only re-tag.
.not-on-changelog-fold:
  rules:
    - if: '$CI_COMMIT_MESSAGE =~ /^docs: assemble changelog/'
      when: never

# Folds accumulated changelog.d/*.md fragments into CHANGELOG.md on the default
# branch, deletes them, and pushes back (idempotent — no-op when empty). The push
# (via RENOVATE_TOKEN) fires the follow-up pipeline in which the dir is empty, so
# push:tag's GATE_ON_FRAGMENTS passes and tagging runs against the assembled tree.
"assemble-changelog":
  extends: .assemble-changelog
  stage: .pre
  variables:
    GITLAB_PUSH_TOKEN: $RENOVATE_TOKEN
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH && $CI_PIPELINE_SOURCE != "schedule"

"push:tag":
  extends: .tag
  stage: push
  variables:
    # Defer tag to the post-assemble follow-up pipeline while fragments are still
    # pending (option a). This is the one push-stage job that DOES run on the fold
    # commit — it tags the assembled tree once changelog.d is drained.
    GATE_ON_FRAGMENTS: 'true'
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH && $CI_PIPELINE_SOURCE != "schedule"
      when: on_success

"pr-check:build":
  extends: .buildkit-build-check
  stage: pr-check
  rules: !reference [.image-build-rules, rules]

"push:image":
  extends: .buildkit-docker-push
  stage: push
  rules:
    - !reference [.not-on-changelog-fold, rules]
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH && $CI_PIPELINE_SOURCE != "schedule"
      when: on_success

# Producer side of the docker-apps image-pin bump flow.
# BUMP_SOURCE=magic-mirror (not magic-mirror-docker) — docker-apps rewrites
# the pin in both apps/mirror/castro and apps/mirror/concord manifests.
# See github-workflows/gitlab/trigger-bump.yml for the template details.
trigger-bump-docker-apps:
  extends: .trigger-bump
  stage: push
  needs:
    - job: "push:image"
      artifacts: true
  variables:
    BUMP_SOURCE: 'magic-mirror'
  rules:
    - !reference [.not-on-changelog-fold, rules]
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH && $CI_PIPELINE_SOURCE != "schedule"
      when: on_success

"pr-check:secrets":
  extends: .trufflehog
  stage: pr-check
  rules:
    # Fork MRs require a project member to manually trigger jobs — prevents untrusted code from running CI automatically
    - if: $CI_PIPELINE_SOURCE == "merge_request_event" && $CI_MERGE_REQUEST_SOURCE_PROJECT_ID != $CI_PROJECT_ID
      when: manual
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"

"pr-check:scan":
  extends: .trufflehog-image
  stage: pr-check
  needs: ["pr-check:build"]
  variables:
    TRUFFLEHOG_IMAGE_TARBALL: image.tar
  rules: !reference [.image-build-rules, rules]


"notify:mr-opened":
  extends: .discord-notify
  stage: notify
  needs: []
  variables:
    NOTIFY_TYPE: mr_opened
    DISCORD_WEBHOOK_URL: $DISCORD_MR_OPENED_WEBHOOK
  rules:
    # Fork MRs require a project member to manually trigger jobs — prevents untrusted code from running CI automatically
    - if: $CI_PIPELINE_SOURCE == "merge_request_event" && $CI_MERGE_REQUEST_SOURCE_PROJECT_ID != $CI_PROJECT_ID
      when: manual
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      when: always

"notify:push-failure":
  extends: .discord-notify
  stage: notify
  # push:image + trigger-bump are optional: they're excluded on the assemble
  # fold commit (see .not-on-changelog-fold), where only push:tag runs.
  needs:
    - "push:tag"
    - job: "push:image"
      optional: true
    - job: trigger-bump-docker-apps
      optional: true
  variables:
    NOTIFY_TYPE: failure
    DISCORD_WEBHOOK_URL: $DISCORD_BUILD_FAILURE_WEBHOOK
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH && $CI_PIPELINE_SOURCE != "schedule"
      when: on_failure

"notify:renovate-failure":
  extends: .discord-notify
  stage: renovate
  needs: [renovate]
  variables:
    NOTIFY_TYPE: failure
    DISCORD_WEBHOOK_URL: $DISCORD_BUILD_FAILURE_WEBHOOK
    NOTIFY_MESSAGE: 'Renovate failed'
  rules:
    - if: $CI_PIPELINE_SOURCE == "schedule"
      when: on_failure

"notify:merged":
  extends: .discord-notify
  stage: notify
  needs: []
  variables:
    NOTIFY_TYPE: mr_merged
    DISCORD_WEBHOOK_URL: $DISCORD_MR_MERGED_WEBHOOK
  rules:
    # Don't fire a spurious "merged" ping on the assemble fold commit.
    - !reference [.not-on-changelog-fold, rules]
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH && $CI_PIPELINE_SOURCE != "schedule"
      when: always

renovate:
  extends: .renovate
  stage: renovate
  variables:
    GITHUB_COM_TOKEN: $GITHUB_BOT_TOKEN
  rules:
    - if: $CI_PIPELINE_SOURCE == "schedule"

# Scheduled prune of stale automation branches (bump/* + renovate/*) left
# behind because remove_source_branch only fires on MR merge, not on the
# API-driven close of a superseded bump/renovate MR. Rides the weekly
# schedule and reuses RENOVATE_TOKEN. See the github-workflows
# .branch-cleanup template and docs runbooks/branch-cleanup.md.
branch-cleanup:
  extends: .branch-cleanup
  stage: renovate
  variables:
    CLEANUP_AGE_DAYS: "30"
    DRY_RUN: "false"
  rules:
    - if: $CI_PIPELINE_SOURCE == "schedule"

"notify:cleanup-failure":
  extends: .discord-notify
  stage: renovate
  needs: [branch-cleanup]
  variables:
    NOTIFY_TYPE: failure
    DISCORD_WEBHOOK_URL: $DISCORD_BUILD_FAILURE_WEBHOOK
    NOTIFY_MESSAGE: 'Branch cleanup failed'
  rules:
    - if: $CI_PIPELINE_SOURCE == "schedule"
      when: on_failure

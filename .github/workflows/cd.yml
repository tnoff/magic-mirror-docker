name: CD

on:
  pull_request:
    types:
    - closed

jobs:
  tag_build:
    permissions:
      contents: write
    uses: tnoff/github-workflows/.github/workflows/tag.yml@1dcefc7c5dfeb21105e3256bf21fc97b8552252e
    with:
      version_file: ./VERSION
  check_labels:
    permissions:
      contents: read
      pull-requests: read
    uses: tnoff/github-workflows/.github/workflows/check-pr-labels.yml@67a771844f0c59a3e310920197cc173be4d5805b
    with:
      required_labels: 'build-docker'
      require_all_labels: true
      require_merged: true
  build:
    permissions:
      contents: read
    needs: check_labels
    if: needs.check_labels.outputs.conditions_met == 'true'
    uses: tnoff/github-workflows/.github/workflows/ocir-push.yml@67a771844f0c59a3e310920197cc173be4d5805b
    with:
      image_name: ${{ vars.OCI_REPO_NAME }}
      platforms: linux/arm64
    secrets:
      oci_registry: ${{ secrets.OCI_REGISTRY }}
      oci_username: ${{ secrets.OCI_USERNAME }}
      oci_token: ${{ secrets.OCI_TOKEN }}
      oci_namespace: ${{ secrets.OCI_NAMESPACE }}

include:
  - project: 'tnoff-projects/github-workflows'
    ref: 554be9a286bd47745d458214ed1f41e52bcbe072
    file: '/gitlab/tag.yml'
  - project: 'tnoff-projects/github-workflows'
    ref: 554be9a286bd47745d458214ed1f41e52bcbe072
    file: '/gitlab/discord-notify.yml'
  - project: 'tnoff-projects/github-workflows'
    ref: 554be9a286bd47745d458214ed1f41e52bcbe072
    file: '/gitlab/renovate.yml'
  - project: 'tnoff-projects/github-workflows'
    ref: 554be9a286bd47745d458214ed1f41e52bcbe072
    file: '/gitlab/trufflehog.yml'
  - project: 'tnoff-projects/github-workflows'
    ref: 554be9a286bd47745d458214ed1f41e52bcbe072
    file: '/gitlab/trufflehog-image.yml'
  - project: 'tnoff-projects/github-workflows'
    ref: 554be9a286bd47745d458214ed1f41e52bcbe072
    file: '/gitlab/bump-version.yml'

default:
  tags:
    - self-hosted

stages:
  - validate
  - tag
  - build
  - notify
  - renovate

bump-version:
  extends: .bump-version
  stage: validate
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event" && $CI_MERGE_REQUEST_SOURCE_BRANCH_NAME =~ /^renovate\/dev-/

tag-build:
  extends: .tag
  stage: tag
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH && $CI_PIPELINE_SOURCE != "schedule"
      when: on_success

build-check:
  stage: validate
  image: docker.io/moby/buildkit:v0.18.0
  script:
    - |
      buildctl --addr tcp://buildkitd.gitlab-runner.svc.cluster.local:1234 build \
        --frontend dockerfile.v0 \
        --local context=. --local dockerfile=. \
        --output type=docker,name=magic-mirror-docker:ci,dest=image.tar
  artifacts:
    paths:
      - image.tar
    expire_in: 1 day
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event" && $CI_MERGE_REQUEST_SOURCE_PROJECT_ID != $CI_PROJECT_ID
      when: manual
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"

docker-push:
  stage: build
  image: docker.io/moby/buildkit:v0.18.0
  needs: []
  variables:
    DOCKER_CONFIG: /tmp/.docker
  before_script:
    - mkdir -p "$DOCKER_CONFIG"
    - |
      AUTH=$(printf '%s:%s' "$OCI_USERNAME" "$OCI_TOKEN" | base64 | tr -d '\n')
      cat > "$DOCKER_CONFIG/config.json" <<EOF
      {"auths":{"$OCI_REGISTRY":{"auth":"$AUTH"}}}
      EOF
  script:
    - IMAGE="$OCI_REGISTRY/$OCI_NAMESPACE/$OCI_REPO_NAME"
    - |
      buildctl --addr tcp://buildkitd.gitlab-runner.svc.cluster.local:1234 build \
        --frontend dockerfile.v0 \
        --local context=. --local dockerfile=. \
        --opt platform=linux/arm64 \
        --output type=image,name=$IMAGE:$CI_COMMIT_SHORT_SHA,push=true
    - |
      buildctl --addr tcp://buildkitd.gitlab-runner.svc.cluster.local:1234 build \
        --frontend dockerfile.v0 \
        --local context=. --local dockerfile=. \
        --opt platform=linux/arm64 \
        --output type=image,name=$IMAGE:latest,push=true
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH && $CI_PIPELINE_SOURCE != "schedule"
      when: on_success

trufflehog:
  extends: .trufflehog
  stage: validate
  rules:
    # Fork MRs require a project member to manually trigger jobs — prevents untrusted code from running CI automatically
    - if: $CI_PIPELINE_SOURCE == "merge_request_event" && $CI_MERGE_REQUEST_SOURCE_PROJECT_ID != $CI_PROJECT_ID
      when: manual
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"

trufflehog-image:
  extends: .trufflehog-image
  stage: validate
  needs: [build-check]
  variables:
    TRUFFLEHOG_IMAGE_TARBALL: image.tar
  rules:
    # Fork MRs require a project member to manually trigger jobs — prevents untrusted code from running CI automatically
    - if: $CI_PIPELINE_SOURCE == "merge_request_event" && $CI_MERGE_REQUEST_SOURCE_PROJECT_ID != $CI_PROJECT_ID
      when: manual
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"


notify-mr:
  extends: .discord-notify
  stage: notify
  needs: []
  variables:
    NOTIFY_TYPE: mr_opened
    DISCORD_WEBHOOK_URL: $DISCORD_MR_WEBHOOK
  rules:
    # Fork MRs require a project member to manually trigger jobs — prevents untrusted code from running CI automatically
    - if: $CI_PIPELINE_SOURCE == "merge_request_event" && $CI_MERGE_REQUEST_SOURCE_PROJECT_ID != $CI_PROJECT_ID
      when: manual
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      when: always

notify-tag-failure:
  extends: .discord-notify
  stage: notify
  needs: [tag-build, docker-push]
  variables:
    NOTIFY_TYPE: failure
    DISCORD_WEBHOOK_URL: $DISCORD_BUILD_FAILURE_WEBHOOK
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH && $CI_PIPELINE_SOURCE != "schedule"
      when: on_failure

notify-merged:
  extends: .discord-notify
  stage: notify
  needs: []
  variables:
    NOTIFY_TYPE: mr_merged
    DISCORD_WEBHOOK_URL: $DISCORD_MR_WEBHOOK
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH && $CI_PIPELINE_SOURCE != "schedule"
      when: always

renovate:
  extends: .renovate
  stage: renovate
  rules:
    - if: $CI_PIPELINE_SOURCE == "schedule"
